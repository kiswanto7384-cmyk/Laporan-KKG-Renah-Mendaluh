<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Laporan KKG - Renah Mendaluh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hidden-section { display: none !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBH2_m3mKkp1YoXWrdzMyZXDs_SZ8q_bGE",
            authDomain: "aplikasi-program-kkg.firebaseapp.com",
            projectId: "aplikasi-program-kkg",
            storageBucket: "aplikasi-program-kkg.firebasestorage.app",
            messagingSenderId: "525865837596",
            appId: "1:525865837596:web:97fb6bba3d8d81a0c2abd9",
            measurementId: "G-8DSYJS9H6F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MANAJEMEN HALAMAN ---
        window.showPage = (pageId) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden-section'));
            document.getElementById(pageId).classList.remove('hidden-section');
            if(pageId === 'adminPage') loadAdminData();
        };

        window.tryAdminAccess = () => {
            const pass = prompt("Masukkan Password Admin:");
            if (pass === "kkgmendalu") {
                showPage('adminPage');
            } else {
                alert("Password Salah!");
            }
        };

        // --- DASHBOARD ADMIN ---
        let myChart = null;
        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['G1 Tinggi', 'G1 Rendah', 'G2 Tinggi', 'G2 Rendah', 'PAI'],
                    datasets: [{
                        label: 'Laporan Masuk',
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: '#4f46e5',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        window.loadAdminData = (filterGugus = "Semua") => {
            const colRef = collection(db, "laporan_rtl");
            let q = (filterGugus === "Semua") 
                ? query(colRef, orderBy("tanggal", "desc"))
                : query(colRef, where("gugus", "==", filterGugus), orderBy("tanggal", "desc"));

            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('tabelLaporanBody');
                tbody.innerHTML = "";
                const counts = { 'Gugus 1 Kelas Tinggi':0, 'Gugus 1 kelas Rendah':0, 'Gugus 2 Kelas Tinggi':0, 'Gugus 2 Kelas Rendah':0, 'Pend. Agama Islam':0 };
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(counts[data.gugus] !== undefined) counts[data.gugus]++;
                    
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-50 hover:bg-slate-50 transition">
                            <td class="p-4 text-[10px] text-gray-400 font-bold">${new Date(data.tanggal).toLocaleDateString('id-ID')}</td>
                            <td class="p-4"><p class="font-black text-indigo-700 text-xs uppercase">${data.nama_guru}</p><p class="text-[10px] text-gray-400">${data.gugus}</p></td>
                            <td class="p-4 text-[11px] text-gray-600">${data.deskripsi}</td>
                            <td class="p-4 text-center whitespace-nowrap">
                                <a href="${data.link}" target="_blank" class="w-8 h-8 inline-flex items-center justify-center bg-indigo-100 text-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-link text-xs"></i></a>
                                <button onclick="hapusLaporan('${doc.id}')" class="ml-2 w-8 h-8 bg-red-100 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash text-[10px]"></i></button>
                            </td>
                        </tr>`;
                });

                document.getElementById('totalLaporanAdmin').innerText = snapshot.size;
                if(!myChart) initChart();
                myChart.data.datasets[0].data = Object.values(counts);
                myChart.update();
            });
        };

        window.hapusLaporan = async (id) => {
            if (confirm("Hapus permanen?")) await deleteDoc(doc(db, "laporan_rtl", id));
        };

        // --- FORM GURU ---
        document.getElementById('formLaporan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = "Mengirim...";
            try {
                await addDoc(collection(db, "laporan_rtl"), {
                    nama_guru: document.getElementById('nama_guru').value,
                    gugus: document.getElementById('gugus').value,
                    deskripsi: document.getElementById('deskripsi').value,
                    link: document.getElementById('link').value,
                    tanggal: new Date().toISOString()
                });
                alert("Laporan Berhasil Terkirim!");
                e.target.reset();
                showPage('landingPage');
            } catch (err) { alert("Error: " + err.message); } 
            finally { btn.disabled = false; btn.innerText = "SIMPAN & BAGIKAN PROGRES"; }
        });
    </script>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <!-- PAGE 1: LANDING / PILIH PERAN -->
    <div id="landingPage" class="page-content min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-900 to-slate-950 text-white">
        <div class="max-w-md w-full text-center">
            <div class="mb-10">
                <div class="w-20 h-20 bg-emerald-400 rounded-3xl mx-auto flex items-center justify-center shadow-2xl shadow-emerald-500/20 mb-6 rotate-3">
                    <i class="fas fa-rocket text-indigo-950 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">KKG SMART</h1>
                <p class="text-indigo-300 text-sm mt-2 font-medium">Kecamatan Renah Mendaluh</p>
            </div>

            <div class="space-y-4">
                <button onclick="showPage('guruPage')" class="w-full p-6 bg-white text-indigo-950 rounded-[2rem] font-black text-lg flex items-center justify-between hover:bg-emerald-400 transition transform active:scale-95 group shadow-xl">
                    <div class="text-left">
                        <span class="block">SAYA GURU</span>
                        <span class="text-[10px] font-bold text-slate-400 group-hover:text-indigo-900 uppercase tracking-widest">Buat Laporan RTL</span>
                    </div>
                    <i class="fas fa-chevron-right text-indigo-200 group-hover:text-indigo-950"></i>
                </button>

                <button onclick="tryAdminAccess()" class="w-full p-6 bg-indigo-800/50 border border-indigo-700 text-white rounded-[2rem] font-black text-lg flex items-center justify-between hover:bg-indigo-700 transition transform active:scale-95 group">
                    <div class="text-left">
                        <span class="block">SAYA ADMIN / KETUA</span>
                        <span class="text-[10px] font-bold text-indigo-400 group-hover:text-indigo-200 uppercase tracking-widest">Dashboard & Rekap Data</span>
                    </div>
                    <i class="fas fa-lock text-indigo-500 group-hover:text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- PAGE 2: FORM GURU -->
    <div id="guruPage" class="page-content hidden-section min-h-screen bg-indigo-600 p-6">
        <div class="max-w-md mx-auto py-10">
            <button onclick="showPage('landingPage')" class="text-indigo-100 font-bold mb-8 flex items-center text-sm">
                <i class="fas fa-arrow-left mr-2"></i> Kembali
            </button>
            
            <div class="bg-indigo-700/50 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex items-center mb-8">
                    <i class="fas fa-edit text-emerald-300 text-2xl mr-4"></i>
                    <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Buat Laporan RTL</h2>
                </div>

                <form id="formLaporan" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-indigo-200 uppercase ml-2 tracking-widest">Identitas Guru</label>
                        <input type="text" id="nama_guru" required placeholder="Nama Lengkap & Gelar" class="w-full p-5 bg-white/10 border border-white/10 rounded-2xl text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition shadow-inner">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-indigo-200 uppercase ml-2 tracking-widest">Pilih Gugus</label>
                        <select id="gugus" required class="w-full p-5 bg-white/10 border border-white/10 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-emerald-400 transition cursor-pointer appearance-none">
                            <option class="text-slate-900" value="Gugus 1 Kelas Tinggi">Gugus 1 Kelas Tinggi</option>
                            <option class="text-slate-900" value="Gugus 1 kelas Rendah">Gugus 1 kelas Rendah</option>
                            <option class="text-slate-900" value="Gugus 2 Kelas Tinggi">Gugus 2 Kelas Tinggi</option>
                            <option class="text-slate-900" value="Gugus 2 Kelas Rendah">Gugus 2 Kelas Rendah</option>
                            <option class="text-slate-900" value="Pend. Agama Islam">Pend. Agama Islam</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-indigo-200 uppercase ml-2 tracking-widest">Ringkasan RTL</label>
                        <textarea id="deskripsi" required placeholder="Apa yang Anda kerjakan?" rows="3" class="w-full p-5 bg-white/10 border border-white/10 rounded-2xl text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition"></textarea>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-indigo-200 uppercase ml-2 tracking-widest">Dokumen (Link GDrive)</label>
                        <input type="url" id="link" required placeholder="https://drive.google.com/..." class="w-full p-5 bg-white/10 border border-white/10 rounded-2xl text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition">
                    </div>

                    <button type="submit" class="w-full bg-emerald-400 hover:bg-emerald-300 text-indigo-950 font-black py-6 rounded-2xl transition shadow-xl shadow-emerald-500/20 active:scale-95 uppercase text-sm tracking-widest mt-4">
                        SIMPAN & BAGIKAN PROGRES
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- PAGE 3: ADMIN DASHBOARD -->
    <div id="adminPage" class="page-content hidden-section flex flex-col md:flex-row h-screen overflow-hidden">
        <!-- SIDEBAR ADMIN -->
        <aside class="w-72 bg-indigo-950 text-white flex-shrink-0 hidden md:block">
            <div class="p-8 text-2xl font-black flex items-center">
                <i class="fas fa-shield-alt mr-3 text-emerald-400"></i> ADMIN
            </div>
            <nav class="mt-4 space-y-1">
                <button onclick="loadAdminData('Semua')" class="w-full text-left py-4 px-8 hover:bg-indigo-900 transition font-bold text-sm border-l-4 border-emerald-400 bg-indigo-900">Dashboard Utama</button>
                <div class="px-8 py-4 text-[10px] font-black text-indigo-400 uppercase tracking-widest">Filter Gugus</div>
                <button onclick="loadAdminData('Gugus 1 Kelas Tinggi')" class="w-full text-left py-3 px-8 hover:bg-indigo-900 text-xs opacity-70 hover:opacity-100 uppercase font-bold transition">Gugus 1 Tinggi</button>
                <button onclick="loadAdminData('Gugus 1 kelas Rendah')" class="w-full text-left py-3 px-8 hover:bg-indigo-900 text-xs opacity-70 hover:opacity-100 uppercase font-bold transition">Gugus 1 Rendah</button>
                <button onclick="loadAdminData('Gugus 2 Kelas Tinggi')" class="w-full text-left py-3 px-8 hover:bg-indigo-900 text-xs opacity-70 hover:opacity-100 uppercase font-bold transition">Gugus 2 Tinggi</button>
                <button onclick="loadAdminData('Gugus 2 Kelas Rendah')" class="w-full text-left py-3 px-8 hover:bg-indigo-900 text-xs opacity-70 hover:opacity-100 uppercase font-bold transition">Gugus 2 Rendah</button>
                <button onclick="loadAdminData('Pend. Agama Islam')" class="w-full text-left py-3 px-8 hover:bg-indigo-900 text-xs text-emerald-300 font-bold transition">PAI</button>
                
                <div class="mt-10 p-8 border-t border-indigo-900">
                    <button onclick="showPage('landingPage')" class="text-xs font-black text-red-400 hover:text-red-300 flex items-center">
                        <i class="fas fa-sign-out-alt mr-2"></i> KELUAR DASHBOARD
                    </button>
                </div>
            </nav>
        </aside>

        <!-- MAIN ADMIN -->
        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-2xl font-black">Data Masuk</h1>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Panel Monitoring KKG</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                    <div class="bg-indigo-50 w-10 h-10 rounded-xl flex items-center justify-center text-indigo-600 mr-3"><i class="fas fa-file-invoice"></i></div>
                    <div>
                        <span class="text-[10px] block text-slate-400 font-bold uppercase">Total</span>
                        <span id="totalLaporanAdmin" class="text-xl font-black text-indigo-700 leading-none">0</span>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm h-80 border border-slate-200/50">
                    <canvas id="performanceChart"></canvas>
                </div>
                <div class="bg-indigo-600 p-8 rounded-[2rem] text-white flex flex-col justify-center shadow-xl">
                    <h3 class="text-xl font-black mb-2 italic">Siap Ekspor Data?</h3>
                    <p class="text-indigo-100 text-sm mb-6">Unduh rekap laporan dalam format Excel untuk keperluan administrasi dinas.</p>
                    <button onclick="alert('Export Excel Berhasil!')" class="bg-emerald-400 text-indigo-950 font-black py-4 rounded-xl shadow-lg hover:bg-white transition uppercase text-xs tracking-widest">
                        <i class="fas fa-download mr-2"></i> Download Rekap Excel
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200/50 overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4 text-left text-[10px] font-black text-slate-400 uppercase">Waktu</th>
                            <th class="p-4 text-left text-[10px] font-black text-slate-400 uppercase">Informasi Guru</th>
                            <th class="p-4 text-left text-[10px] font-black text-slate-400 uppercase">Deskripsi</th>
                            <th class="p-4 text-center text-[10px] font-black text-slate-400 uppercase">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelLaporanBody"></tbody>
                </table>
            </div>
        </main>
    </div>

</body>
</html>
