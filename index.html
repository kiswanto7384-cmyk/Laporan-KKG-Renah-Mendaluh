<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Laporan KKG Modern - Renah Mendaluh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // GANTI DENGAN CONFIG MILIK ANDA DARI FIREBASE CONSOLE
const firebaseConfig = {
  apiKey: "AIzaSyBH2_m3mKkp1YoXWrdzMyZXDs_SZ8q_bGE",
  authDomain: "aplikasi-program-kkg.firebaseapp.com",
  databaseURL: "https://aplikasi-program-kkg-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aplikasi-program-kkg",
  storageBucket: "aplikasi-program-kkg.firebasestorage.app",
  messagingSenderId: "525865837596",
  appId: "1:525865837596:web:97fb6bba3d8d81a0c2abd9",
  measurementId: "G-8DSYJS9H6F"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LOGIKA DATABASE ---

        // 1. Simpan Laporan ke Firestore
        const form = document.getElementById('formLaporan');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Mengirim...";

            try {
                await addDoc(collection(db, "laporan_rtl"), {
                    judul: document.getElementById('judul_kegiatan').value,
                    gugus: document.getElementById('pilih_gugus').value,
                    link: document.getElementById('link_bukti').value,
                    tanggal: new Date().toISOString(),
                    status: "Review"
                });
                alert("Laporan berhasil dikirim! Menunggu verifikasi.");
                form.reset();
            } catch (error) {
                console.error("Error: ", error);
                alert("Gagal mengirim laporan.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan & Bagikan Progres";
            }
        });

        // 2. Update Grafik Secara Real-time
        const ctx = document.getElementById('performanceChart').getContext('2d');
        let myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Grendah 1', 'Grendah 2', 'Gtinggi 1', 'Gtinggi 2', 'K-PAI'],
                datasets: [{
                    label: 'Jumlah Laporan Masuk',
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: '#4f46e5',
                    borderRadius: 8
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Pantau perubahan data di Firestore
        onSnapshot(collection(db, "laporan_rtl"), (snapshot) => {
            const counts = { 'Gugus Rendah 1': 0, 'Gugus Rendah 2': 0, 'Gugus Tinggi 1': 0, 'Gugus Tinggi 2': 0, 'Komunitas PAI': 0 };
            snapshot.forEach(doc => {
                const data = doc.data();
                if(counts[data.gugus] !== undefined) counts[data.gugus]++;
            });

            // Update Angka di Grafik
            myChart.data.datasets[0].data = Object.values(counts);
            myChart.update();

            // Update Stats Card (Total Laporan)
            document.getElementById('totalLaporan').innerText = snapshot.size;
        });
    </script>
</head>
<body class="bg-gray-100 font-sans">
    <!-- Struktur HTML tetap sama seperti sebelumnya, hanya tambahkan ID pada input -->
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-indigo-900 text-white flex-shrink-0 hidden md:block">
            <div class="p-6 text-2xl font-bold border-b border-indigo-800 flex items-center">
                <i class="fas fa-graduation-cap mr-2 text-emerald-400"></i> KKG SMART
            </div>
            <nav class="mt-6">
                <a href="#" class="flex items-center py-3 px-6 bg-indigo-800 border-l-4 border-emerald-400">
                    <i class="fas fa-home mr-3"></i> Dashboard Utama
                </a>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition"><i class="fas fa-child mr-3"></i> Kelas Rendah</a>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition"><i class="fas fa-user-graduate mr-3"></i> Kelas Tinggi</a>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition"><i class="fas fa-mosque mr-3"></i> Komunitas PAI</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">E-Laporan KKG Renah Mendaluh</h1>
                    <p class="text-gray-500 text-sm">Dashboard Admin SDN 165</p>
                </div>
            </header>

            <!-- STATS CARDS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-gray-500 text-sm font-medium">Total Laporan RTL</p>
                    <h2 id="totalLaporan" class="text-3xl font-bold text-gray-800">0</h2>
                </div>
                <!-- Card lain tetap sama -->
            </div>

            <!-- CHART -->
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-8">
                <h3 class="text-lg font-bold text-gray-700 mb-4">Grafik Real-time Kinerja Gugus</h3>
                <div class="h-64"><canvas id="performanceChart"></canvas></div>
            </div>

            <!-- FORM INPUT -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-2xl">
                <h3 class="text-lg font-bold text-gray-800 mb-6 italic text-indigo-600">"Kreativitas Anda Adalah Inspirasi Kami"</h3>
                <form id="formLaporan" class="space-y-4">
                    <input type="text" id="judul_kegiatan" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl" placeholder="Judul Pelatihan">
                    <select id="pilih_gugus" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl">
                        <option>Gugus Rendah 1</option>
                        <option>Gugus Rendah 2</option>
                        <option>Gugus Tinggi 1</option>
                        <option>Gugus Tinggi 2</option>
                        <option>Komunitas PAI</option>
                    </select>
                    <input type="url" id="link_bukti" required class="w-full px-4 py-3 bg-gray-50 border rounded-xl" placeholder="Link Google Drive Laporan">
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Simpan & Bagikan Progres</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
