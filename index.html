<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Laporan KKG - Renah Mendaluh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Library untuk Export Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBH2_m3mKkp1YoXWrdzMyZXDs_SZ8q_bGE",
            authDomain: "aplikasi-program-kkg.firebaseapp.com",
            projectId: "aplikasi-program-kkg",
            storageBucket: "aplikasi-program-kkg.firebasestorage.app",
            messagingSenderId: "525865837596",
            appId: "1:525865837596:web:97fb6bba3d8d81a0c2abd9",
            measurementId: "G-8DSYJS9H6F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SISTEM LOGIN KKG INTI ---
        window.loginUser = () => {
            const pass = prompt("Masukkan Password Admin / Ketua KKG:");
            // Password default: kkgmendalu (Silahkan ganti sesuai keinginan)
            if (pass === "kkgmendalu") { 
                localStorage.setItem('kkg_role', 'admin');
                alert("Akses Admin Aktif!");
                location.reload();
            } else if (pass === "" || pass === null) {
                // cancel
            } else {
                localStorage.setItem('kkg_role', 'guru');
                alert("Password Salah! Kembali ke Mode Guru.");
                location.reload();
            }
        };

        window.logout = () => {
            localStorage.setItem('kkg_role', 'guru');
            location.reload();
        };

        const currentRole = localStorage.getItem('kkg_role') || 'guru';
        
        // --- CHART CONFIG ---
        const ctx = document.getElementById('performanceChart').getContext('2d');
        let myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Grendah 1', 'Grendah 2', 'Gtinggi 1', 'Gtinggi 2', 'K-PAI'],
                datasets: [{
                    label: 'Jumlah Laporan',
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: '#4f46e5',
                    borderRadius: 10
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Simpan data snapshot untuk export excel
        let currentDataRaw = [];

        // --- LOGIKA DATA REAL-TIME ---
        function loadData(filterGugus = "Semua") {
            const q = filterGugus === "Semua" 
                ? query(collection(db, "laporan_rtl"), orderBy("tanggal", "desc"))
                : query(collection(db, "laporan_rtl"), where("gugus", "==", filterGugus), orderBy("tanggal", "desc"));

            onSnapshot(q, (snapshot) => {
                currentDataRaw = [];
                snapshot.forEach(doc => {
                    currentDataRaw.push({ id: doc.id, ...doc.data() });
                });
                updateDashboard(snapshot, filterGugus);
                renderTable(snapshot);
            });
        }

        function updateDashboard(snapshot, filter) {
            const counts = { 'Gugus Rendah 1': 0, 'Gugus Rendah 2': 0, 'Gugus Tinggi 1': 0, 'Gugus Tinggi 2': 0, 'Komunitas PAI': 0 };
            snapshot.forEach(doc => {
                const d = doc.data();
                if(counts[d.gugus] !== undefined) counts[d.gugus]++;
            });
            document.getElementById('totalLaporan').innerText = snapshot.size;
            myChart.data.datasets[0].data = Object.values(counts);
            myChart.update();
            document.getElementById('filterStatus').innerText = filter;
        }

        // --- FUNGSI HAPUS (KHUSUS ADMIN) ---
        window.hapusLaporan = async (id) => {
            if (currentRole !== 'admin') return alert("Akses Ditolak!");
            if (confirm("Hapus laporan ini secara permanen?")) {
                try {
                    await deleteDoc(doc(db, "laporan_rtl", id));
                } catch (err) {
                    alert("Gagal menghapus.");
                }
            }
        };

        function renderTable(snapshot) {
            const tbody = document.getElementById('tabelLaporanBody');
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const tgl = new Date(data.tanggal).toLocaleString('id-ID');
                
                const deleteBtn = currentRole === 'admin' 
                    ? `<button onclick="hapusLaporan('${id}')" class="ml-2 w-8 h-8 bg-red-100 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash text-[10px]"></i></button>`
                    : '';

                tbody.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-indigo-50/30 transition">
                        <td class="py-4 px-4 text-[10px] font-bold text-gray-400">${tgl}</td>
                        <td class="py-4 px-4">
                            <p class="font-black text-indigo-700 text-sm uppercase">${data.nama_guru}</p>
                            <p class="text-[10px] text-gray-400">${data.gugus}</p>
                        </td>
                        <td class="py-4 px-4 text-xs text-gray-600 italic">"${data.deskripsi || '-'}"</td>
                        <td class="py-4 px-4 text-center">
                            <a href="${data.link}" target="_blank" class="inline-flex items-center justify-center w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full hover:bg-indigo-600 hover:text-white transition">
                                <i class="fas fa-link text-xs"></i>
                            </a>
                            ${deleteBtn}
                        </td>
                    </tr>`;
            });
        }

        // --- FUNGSI DOWNLOAD EXCEL ---
        window.downloadExcel = () => {
            if (currentDataRaw.length === 0) return alert("Tidak ada data untuk diunduh.");
            
            const dataExport = currentDataRaw.map(item => ({
                Tanggal: new Date(item.tanggal).toLocaleString('id-ID'),
                Nama_Guru: item.nama_guru,
                Gugus: item.gugus,
                Deskripsi_Kegiatan: item.deskripsi,
                Link_Laporan: item.link
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan KKG");
            XLSX.writeFile(workbook, `Laporan_KKG_RenahMendaluh_${new Date().toLocaleDateString()}.xlsx`);
        };

        // --- SIMPAN DATA ---
        document.getElementById('formLaporan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Mengirim...";
            
            try {
                await addDoc(collection(db, "laporan_rtl"), {
                    nama_guru: document.getElementById('nama_guru').value,
                    gugus: document.getElementById('gugus').value,
                    deskripsi: document.getElementById('deskripsi').value,
                    link: document.getElementById('link').value,
                    tanggal: new Date().toISOString()
                });
                alert("Laporan Berhasil Disimpan!"); 
                e.target.reset();
            } catch (err) { 
                alert("Gagal Simpan Data!"); 
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan & Bagikan Progres";
            }
        });

        window.setFilter = (val) => {
            loadData(val);
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('bg-indigo-800', 'border-l-4', 'border-emerald-400'));
            event.currentTarget.classList.add('bg-indigo-800', 'border-l-4', 'border-emerald-400');
        };

        // Inisialisasi Tampilan
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userRoleDisplay').innerText = currentRole.toUpperCase();
            if(currentRole === 'admin') {
                document.getElementById('btnDownloadExcel').classList.remove('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
            }
        });

        loadData();
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-indigo-950 text-white flex-shrink-0 hidden md:block">
            <div class="p-8 text-2xl font-black border-b border-indigo-900 flex items-center">
                <i class="fas fa-rocket mr-3 text-emerald-400"></i> KKG SMART
            </div>
            <nav class="mt-6">
                <button onclick="setFilter('Semua')" class="nav-link w-full flex items-center py-4 px-8 transition bg-indigo-800 border-l-4 border-emerald-400">
                    <i class="fas fa-layer-group mr-3 text-sm text-emerald-400"></i> Dashboard Utama
                </button>
                <div class="px-8 py-6 text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Navigasi Gugus</div>
                <div class="space-y-1">
                    <button onclick="setFilter('Gugus Rendah 1')" class="nav-link w-full flex items-center py-3 px-8 hover:bg-indigo-900 transition text-sm opacity-80 hover:opacity-100">Gugus Rendah 1</button>
                    <button onclick="setFilter('Gugus Rendah 2')" class="nav-link w-full flex items-center py-3 px-8 hover:bg-indigo-900 transition text-sm opacity-80 hover:opacity-100">Gugus Rendah 2</button>
                    <button onclick="setFilter('Gugus Tinggi 1')" class="nav-link w-full flex items-center py-3 px-8 hover:bg-indigo-900 transition text-sm opacity-80 hover:opacity-100">Gugus Tinggi 1</button>
                    <button onclick="setFilter('Gugus Tinggi 2')" class="nav-link w-full flex items-center py-3 px-8 hover:bg-indigo-900 transition text-sm opacity-80 hover:opacity-100">Gugus Tinggi 2</button>
                    <button onclick="setFilter('Komunitas PAI')" class="nav-link w-full flex items-center py-3 px-8 hover:bg-indigo-900 transition text-sm opacity-80 hover:opacity-100 font-bold text-emerald-300">Komunitas PAI</button>
                </div>
                
                <div class="mt-10 pt-6 border-t border-indigo-900 px-8 space-y-4">
                    <button onclick="loginUser()" class="text-xs font-bold text-indigo-300 hover:text-white flex items-center">
                        <i class="fas fa-lock mr-2"></i> Mode: <span id="userRoleDisplay" class="ml-1 text-emerald-400 font-black">GURU</span>
                    </button>
                    <button id="btnLogout" onclick="logout()" class="hidden text-xs font-bold text-red-400 hover:text-red-200 flex items-center">
                        <i class="fas fa-sign-out-alt mr-2"></i> KELUAR ADMIN
                    </button>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tight">E-Laporan <span class="text-indigo-600" id="filterStatus">Semua</span></h1>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Kecamatan Renah Mendaluh</p>
                </div>
                <div class="flex gap-4">
                    <button id="btnDownloadExcel" onclick="downloadExcel()" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold text-xs flex items-center shadow-lg transition active:scale-95">
                        <i class="fas fa-file-excel mr-2"></i> DOWNLOAD REKAP EXCEL
                    </button>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center">
                        <div class="bg-indigo-50 w-10 h-10 rounded-xl flex items-center justify-center text-indigo-600 mr-3">
                            <i class="fas fa-file-signature"></i>
                        </div>
                        <div>
                            <span class="text-[10px] block text-slate-400 font-bold uppercase">Total Laporan</span>
                            <span id="totalLaporan" class="text-xl font-black text-indigo-700 leading-none">0</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- CHART -->
                <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-white h-96">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-slate-700 uppercase text-xs tracking-widest">Statistik Kinerja Gugus</h3>
                        <i class="fas fa-chart-bar text-indigo-200"></i>
                    </div>
                    <canvas id="performanceChart"></canvas>
                </div>

                <!-- FORM INPUT -->
                <div class="bg-indigo-600 p-8 rounded-[2rem] shadow-2xl shadow-indigo-200 text-white relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
                    <h3 class="font-black text-xl mb-6 flex items-center tracking-tight">
                        <i class="fas fa-edit mr-3 text-emerald-300"></i> Buat Laporan RTL
                    </h3>
                    <form id="formLaporan" class="space-y-4 relative z-10">
                        <input type="text" id="nama_guru" required placeholder="Nama Lengkap Guru" class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl placeholder-indigo-100 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition">
                        
                        <select id="gugus" required class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-400 transition text-sm appearance-none">
                            <option value="Gugus Rendah 1">Gugus Rendah 1</option>
                            <option value="Gugus Rendah 2">Gugus Rendah 2</option>
                            <option value="Gugus Tinggi 1">Gugus Tinggi 1</option>
                            <option value="Gugus Tinggi 2">Gugus Tinggi 2</option>
                            <option value="Komunitas PAI">Komunitas PAI</option>
                        </select>

                        <textarea id="deskripsi" required placeholder="Deskripsi singkat kegiatan RTL..." rows="3" class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl placeholder-indigo-100 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition text-sm"></textarea>

                        <input type="url" id="link" required placeholder="Link Laporan (GDrive)" class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl placeholder-indigo-100 focus:outline-none focus:ring-2 focus:ring-emerald-400 transition text-sm">
                        
                        <button type="submit" class="w-full bg-emerald-400 hover:bg-emerald-300 text-indigo-950 font-black py-5 rounded-2xl transition shadow-lg shadow-indigo-800/20 active:scale-95 uppercase text-xs tracking-widest">
                            Simpan & Bagikan Progres
                        </button>
                    </form>
                </div>
            </div>

            <!-- TABLE SECTION -->
            <div class="mt-12 bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-white overflow-hidden">
                <div class="px-8 py-8 border-b border-slate-50 flex justify-between items-center">
                    <div>
                        <h3 class="font-black text-slate-800 uppercase text-sm tracking-widest">Log Aktivitas Terbaru</h3>
                        <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase">Data Masuk Kecamatan Renah Mendaluh</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-xs">Live Database</span>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead>
                            <tr class="bg-slate-50/50">
                                <th class="py-4 px-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Waktu</th>
                                <th class="py-4 px-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Informasi Guru</th>
                                <th class="py-4 px-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Deskripsi RTL</th>
                                <th class="py-4 px-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelLaporanBody">
                            <!-- Data Terisi Otomatis -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
