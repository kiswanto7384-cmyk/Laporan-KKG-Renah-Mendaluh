<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Laporan KKG Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-900 text-white flex-shrink-0 hidden md:block">
            <div class="p-6 text-2xl font-bold border-b border-indigo-800">KKG SMART</div>
            <nav class="mt-6">
                <a href="#" class="flex items-center py-3 px-6 bg-indigo-800 border-l-4 border-emerald-400">
                    <i class="fas fa-home mr-3"></i> Dashboard Utama
                </a>
                <div class="px-6 py-4 text-xs font-semibold text-indigo-300 uppercase">Gugus & Komunitas</div>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition">
                    <i class="fas fa-users mr-3"></i> Kelas Rendah (1 & 2)
                </a>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition">
                    <i class="fas fa-users mr-3"></i> Kelas Tinggi (1 & 2)
                </a>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition">
                    <i class="fas fa-mosque mr-3"></i> Komunitas PAI
                </a>
                <div class="px-6 py-4 text-xs font-semibold text-indigo-300 uppercase">Admin</div>
                <a href="#" class="flex items-center py-3 px-6 hover:bg-indigo-800 transition">
                    <i class="fas fa-user-cog mr-3"></i> Daftar User
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <!-- Header -->
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Progres Kinerja KKG</h1>
                <div class="flex items-center bg-white p-2 rounded-lg shadow-sm">
                    <span class="text-gray-600 mr-4">Admin SDN 165</span>
                    <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-blue-500">
                    <div class="text-gray-500 text-sm">Total Laporan RTL</div>
                    <div class="text-3xl font-bold">128</div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-yellow-500">
                    <div class="text-gray-500 text-sm">Sedang Review</div>
                    <div class="text-3xl font-bold">14</div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-b-4 border-emerald-500">
                    <div class="text-gray-500 text-sm">Selesai Diverifikasi</div>
                    <div class="text-3xl font-bold">114</div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
                <h3 class="text-lg font-semibold mb-4 text-gray-700">Grafik Kinerja 5 Gugus</h3>
                <canvas id="performanceChart" height="100"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Script untuk Grafik (Placeholder Data)
        const ctx = document.getElementById('performanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Gugus Rendah 1', 'Gugus Rendah 2', 'Gugus Tinggi 1', 'Gugus Tinggi 2', 'Komunitas PAI'],
                datasets: [{
                    label: '% Progres Kegiatan',
                    data: [85, 70, 92, 65, 88], // Data ini nantinya dari Firebase
                    backgroundColor: ['#3b82f6', '#3b82f6', '#10b981', '#3b82f6', '#8b5cf6'],
                    borderRadius: 8
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    </script>
</body>
</html>
